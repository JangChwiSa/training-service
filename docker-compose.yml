services:
  training-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: training-service:local
    container_name: training-service-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: training_db
      DB_USERNAME: ${DB_USERNAME:-training_user}
      DB_PASSWORD: ${DB_PASSWORD:-training_password}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-30000}
      TRUSTED_USER_ID_HEADER: ${TRUSTED_USER_ID_HEADER:-X-User-Id}
      EVENT_BROKER_ENABLED: ${EVENT_BROKER_ENABLED:-false}
      EVENT_BROKER_ENDPOINT: ${EVENT_BROKER_ENDPOINT:-}
      OUTBOX_PUBLISH_ENABLED: ${OUTBOX_PUBLISH_ENABLED:-false}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    networks:
      - training-service-net

  mysql:
    image: mysql:8.4
    container_name: training-service-mysql
    environment:
      MYSQL_DATABASE: training_db
      MYSQL_USER: ${DB_USERNAME:-training_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-training_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-training_root_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - training-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - training-service-net

volumes:
  training-mysql-data:

networks:
  training-service-net:
    driver: bridge
