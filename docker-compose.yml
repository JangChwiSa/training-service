services:
  training-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: training-service:local
    container_name: training-service-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: training_db
      DB_USERNAME: ${DB_USERNAME:-training_user}
      DB_PASSWORD: ${DB_PASSWORD:-training_password}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-30000}
      OPENAI_ADAPTER: ${OPENAI_ADAPTER:-local-fake}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1/responses}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      TRUSTED_USER_ID_HEADER: ${TRUSTED_USER_ID_HEADER:-X-User-Id}
      OUTBOX_PUBLISHER_ENABLED: ${OUTBOX_PUBLISHER_ENABLED:-false}
      OUTBOX_PUBLISHER_BATCH_SIZE: ${OUTBOX_PUBLISHER_BATCH_SIZE:-50}
      OUTBOX_PUBLISHER_FIXED_DELAY_MS: ${OUTBOX_PUBLISHER_FIXED_DELAY_MS:-5000}
      OUTBOX_RETRY_BACKOFF_BASE_SECONDS: ${OUTBOX_RETRY_BACKOFF_BASE_SECONDS:-60}
      OUTBOX_RETRY_BACKOFF_MAX_SECONDS: ${OUTBOX_RETRY_BACKOFF_MAX_SECONDS:-3600}
      EVENT_BROKER_URL: ${EVENT_BROKER_URL:-}
      EVENT_BROKER_TIMEOUT_MS: ${EVENT_BROKER_TIMEOUT_MS:-5000}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${SERVER_PORT:-8080}/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - training-service-net

  mysql:
    image: mysql:8.4
    container_name: training-service-mysql
    environment:
      MYSQL_DATABASE: training_db
      MYSQL_USER: ${DB_USERNAME:-training_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-training_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-training_root_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - training-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - training-service-net

volumes:
  training-mysql-data:

networks:
  training-service-net:
    driver: bridge
