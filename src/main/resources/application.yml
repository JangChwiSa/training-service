spring:
  application:
    name: training-service
  profiles:
    default: local

server:
  port: 8080

training:
  security:
    trusted-user-id-header: ${TRUSTED_USER_ID_HEADER:X-User-Id}
  openai:
    api-key: ${OPENAI_API_KEY:}
    timeout-ms: ${OPENAI_TIMEOUT_MS:30000}
    adapter: ${OPENAI_ADAPTER:local-fake}
